<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrador Hoteles</title>
    <link rel="stylesheet" href="../styles/admin.css">
</head>
<body>

<div class="page-wrapper">

    <!-- Header -->
    <header class="page-header">
        <div class="page-header-left">
            <div class="logo-mark">
                <svg viewBox="0 0 24 24">
                    <path d="M3 21h18M5 21V7l7-4 7 4v14M9 21v-4h6v4"/>
                </svg>
            </div>
            <div>
                <h1>Gestión de Hoteles</h1>
                <p>Administrá tu cartera de propiedades</p>
            </div>
        </div>
    </header>

    <!-- Stats -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="label">Hoteles</div>
            <div class="value" id="statHoteles">0</div>
        </div>
        <div class="stat-card">
            <div class="label">Habitaciones</div>
            <div class="value" id="statHabitaciones">0</div>
        </div>
        <div class="stat-card">
            <div class="label">Promedio hab.</div>
            <div class="value" id="statPromedio">—</div>
        </div>
    </div>

    <!-- Form -->
    <div class="form-card">
        <div class="form-card-header">
            <span class="dot"></span>
            <h2>Nuevo hotel</h2>
        </div>

        <form id="hotelForm">
            <div class="form-grid">
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" placeholder="Ej: Hotel Palermo" required>
                </div>

                <div class="form-group">
                    <label for="localizacion">Localización</label>
                    <input type="text" id="localizacion" placeholder="Ej: Buenos Aires" required>
                </div>

                <div class="form-group">
                    <label for="habitaciones">Habitaciones</label>
                    <input type="number" id="habitaciones" placeholder="Ej: 80" min="1" required>
                </div>

                 <div class="form-group">
                    <label for="precio">Precio por noche ($)</label>
                    <input type="number" id="precio" placeholder="Ej: 45000" min="0" step="0.01" required>
                </div>

                <div class="form-group">
                    <label for="imagen">URL imagen</label>
                    <input type="text" id="imagen" placeholder="https://...">
                </div>

                <div class="form-group full">
                    <label for="descripcion">Descripción</label>
                    <textarea id="descripcion" placeholder="Breve descripción del hotel..."></textarea>
                </div>
            </div>

            <div class="form-actions">
                <button type="reset" class="btn btn-ghost">Cancelar</button>
                <button type="submit" class="btn btn-primary">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                    Crear hotel
                </button>
            </div>
        </form>
    </div>

    <!-- List -->
    <div>
        <div class="list-header">
            <h2>Hoteles registrados</h2>
            <span class="count" id="countLabel">0 propiedades</span>
        </div>
        <div id="listaHoteles"></div>
    </div>

</div>

<script src="/pages/pagesJS/admin.js"></script>
</body>
</html>
