<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>ICLUD</title>
  <link rel="stylesheet" href="/frontend/styles/styles.css"/>
  <script src="/frontend/pages/index.js"></script>
</head>
<body>

  <header>
    <div class="logo">ICLUD</div>
    <nav>
      <a href="catalogo.html">Alojamientos</a>
      <a href="#">Explorar</a>
      <a href="#">Ofertas</a>
      <a href="admin.html">Administrador</a> <!-- Aca hay que agregar la pagina de contraseña luego -->   
    </nav>
  </header>

  <section class="hero">
    <div class="hero-content">
      <h1>Encontrá tu próximo viaje</h1>
      <p>Compará hoteles, departamentos y alojamientos en un solo lugar.</p>
      <div class="search-box">
        <input type="text" id="search-destino" placeholder="Destino">
        <input type="date">
        <input type="date">
        <input type="date"> 
        <input type="number" placeholder="Personas">
        <button id="btn-buscar-hero">Buscar</button>
      </div>
    </div>
  </section>

  <section class="section">
    <h2 class="section-title">Alojamientos Populares</h2>
    <div class="cards" id="cards-container">
      
      </div>
  </section>

  <section class="section">
    <h2 class="section-title">Explorá Destinos</h2>
    <div class="explore">

      <div class="explore-card">
        <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1200" alt="Playa">
        <h2>Playa</h2>
      </div>

      <div class="explore-card">
        <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=1200" alt="Montaña">
        <h2>Montaña</h2>
      </div>

      <div class="explore-card">
        <img src="https://images.unsplash.com/photo-1514565131-fce0801e5785?q=80&w=1200" alt="Ciudad">
        <h2>Ciudad</h2>
      </div>

      <div class="explore-card">
        <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=1200" alt="Naturaleza">
        <h2>Naturaleza</h2>
      </div>

    </div>
  </section>

  <footer>
    <p>© 2026 ICLUD - Proyecto de Prácticas Profesionalizantes</p>
  </footer>
  <div class="toast" id="toast"></div>
  <script>
  document.getElementById("btn-buscar-hero").addEventListener("click", () => {
      const destino = document.getElementById("search-destino").value.trim();
      if (!destino) {
          alert("Por favor, ingresá un destino (Ej: Miami)");
          return;
      }
      // Al estar en la misma carpeta, le pegamos directo al archivo
      window.location.href = `resultados.html?location=${encodeURIComponent(destino)}`;
  });
</script>

</body>
</html>
